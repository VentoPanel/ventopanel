server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    # Docker's internal DNS — resolves container names at request time,
    # so nginx starts successfully even if api/frontend aren't ready yet.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── WebSocket: SSH terminal ────────────────────────────────────────────────
    location ~ ^/api/v1/servers/[^/]+/terminal(/.*)?$ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SSE: server metrics + log stream ──────────────────────────────────────
    location ~ ^/api/v1/servers/[^/]+/(metrics/stream|logs/stream) {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Cache-Control      no-cache;
        proxy_set_header X-Accel-Buffering  no;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # ── SSE: site container log stream ────────────────────────────────────────
    location ~ ^/api/v1/sites/[^/]+/container/logs/stream {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Cache-Control      no-cache;
        proxy_set_header X-Accel-Buffering  no;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # ── Everything else → Next.js frontend ────────────────────────────────────
    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 60s;
    }
}
