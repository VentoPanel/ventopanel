upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream api {
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    # ── WebSocket: SSH terminal ────────────────────────────────────────────────
    location ~ ^/api/v1/servers/[^/]+/terminal(/.*)?$ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SSE: server metrics + log stream ──────────────────────────────────────
    location ~ ^/api/v1/servers/[^/]+/(metrics/stream|logs/stream) {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Cache-Control      no-cache;
        proxy_set_header X-Accel-Buffering  no;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # ── SSE: site container log stream ────────────────────────────────────────
    location ~ ^/api/v1/sites/[^/]+/container/logs/stream {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Cache-Control      no-cache;
        proxy_set_header X-Accel-Buffering  no;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # ── Everything else → Next.js frontend ────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        # Forward WebSocket upgrade headers (Next.js HMR in dev)
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 60s;
    }
}
