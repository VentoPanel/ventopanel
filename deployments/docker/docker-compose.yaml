services:
  postgres:
    image: postgres:17
    container_name: ventopanel-postgres
    environment:
      POSTGRES_DB: ventopanel
      POSTGRES_USER: vento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vento}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vento -d ventopanel"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ventopanel-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: ventopanel-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-VentoPanel}
      APP_ENV: ${APP_ENV:-production}
      HTTP_PORT: ${HTTP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://vento:vento@postgres:5432/ventopanel?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      REDIS_DB: ${REDIS_DB:-0}
      SSH_DIAL_TIMEOUT: ${SSH_DIAL_TIMEOUT:-10s}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      SSL_CERTBOT_EMAIL: ${SSL_CERTBOT_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-insecure-change-me}
      AUTH_ALLOW_HEADER_FALLBACK: ${AUTH_ALLOW_HEADER_FALLBACK:-true}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-7}
      FILE_MANAGER_ROOT: ${FILE_MANAGER_ROOT:-/var/www}
    volumes:
      - backup_data:/data/backups
      - www_data:/var/www
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: ventopanel-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: ventopanel-frontend
    expose:
      - "3000"
    environment:
      API_URL: ${API_URL:-http://api:8080}
      # NEXT_PUBLIC_API_WS_URL — override only if using a custom domain with HTTPS.
      # Default: derived from window.location.host (Nginx proxies WebSocket to api:8080).
      # Example: NEXT_PUBLIC_API_WS_URL=wss://panel.example.com
      NEXT_PUBLIC_API_WS_URL: ${NEXT_PUBLIC_API_WS_URL:-}
      # NEXT_PUBLIC_API_BASE_URL — override only if using a custom domain with HTTPS.
      # Default: derived from window.location.origin (Nginx proxies SSE to api:8080).
      # Example: NEXT_PUBLIC_API_BASE_URL=https://panel.example.com
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    tmpfs:
      - /var/tmp:size=16m,mode=1777,noexec
      - /tmp:size=32m,mode=1777,noexec

volumes:
  postgres_data:
  redis_data:
  backup_data:
  www_data:
