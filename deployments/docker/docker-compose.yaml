services:
  postgres:
    image: postgres:17
    container_name: ventopanel-postgres
    environment:
      POSTGRES_DB: ventopanel
      POSTGRES_USER: vento
      POSTGRES_PASSWORD: vento
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vento -d ventopanel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ventopanel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: ventopanel-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-VentoPanel}
      APP_ENV: ${APP_ENV:-development}
      HTTP_PORT: ${HTTP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://vento:vento@postgres:5432/ventopanel?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_DB: ${REDIS_DB:-0}
      SSH_DIAL_TIMEOUT: ${SSH_DIAL_TIMEOUT:-10s}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      SSL_CERTBOT_EMAIL: ${SSL_CERTBOT_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-insecure-change-me}
      AUTH_ALLOW_HEADER_FALLBACK: ${AUTH_ALLOW_HEADER_FALLBACK:-true}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-7}
      FILE_MANAGER_ROOT: ${FILE_MANAGER_ROOT:-/var/www}
    volumes:
      - backup_data:/data/backups
      - www_data:/var/www
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: ventopanel-frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: ${API_URL:-http://api:8080}
      # NEXT_PUBLIC_API_WS_URL is the WebSocket base the *browser* uses to reach the Go API directly.
      # It must be reachable from the client — set to your domain/IP with port 8080 if behind Nginx.
      # Example: NEXT_PUBLIC_API_WS_URL=wss://panel.example.com (if Nginx proxies WebSocket)
      # Default: ws://<same host>:8080  (direct to API port, works when port 8080 is exposed)
      NEXT_PUBLIC_API_WS_URL: ${NEXT_PUBLIC_API_WS_URL:-}
      # NEXT_PUBLIC_API_BASE_URL is the HTTP base the *browser* uses to reach the Go API directly
      # for SSE endpoints (Resource Monitor, Log Viewer). Must match host/port accessible from the browser.
      # Example: NEXT_PUBLIC_API_BASE_URL=https://panel.example.com (if Nginx proxies /api)
      # Default: http://<same host>:8080
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  backup_data:
  www_data:
