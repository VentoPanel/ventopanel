services:
  api:
    restart: unless-stopped
    environment:
      APP_ENV: production
      AUTH_ALLOW_HEADER_FALLBACK: "false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: ventopanel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: ${API_URL:-http://api:8080}
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
